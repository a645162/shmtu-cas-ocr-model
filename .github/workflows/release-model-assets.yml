name: Release Model Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to process
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04
    outputs:
      release-tag: ${{ steps.tag.outputs.release-tag }}
    steps:
      - name: Resolve Release Tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$EVENT_TAG}"
          if [ -z "$TAG" ]; then
            echo "release tag is empty" >&2
            exit 1
          fi
          echo "release-tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download PyTorch Checkpoints
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ steps.tag.outputs.release-tag }}
        run: |
          set -euo pipefail
          mkdir -p release_checkpoints
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.pt" --dir release_checkpoints || true
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.pth" --dir release_checkpoints || true
          COUNT="$(find release_checkpoints -maxdepth 1 -type f \( -name '*.pt' -o -name '*.pth' \) | wc -l)"
          if [ "$COUNT" -eq 0 ]; then
            echo "no checkpoint assets found in release $RELEASE_TAG" >&2
            exit 1
          fi
          find release_checkpoints -maxdepth 1 -type f | sort

      - name: Upload Checkpoints Artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-checkpoints
          path: release_checkpoints/*

  export-release-engine:
    runs-on: ubuntu-24.04
    needs: prepare-release
    strategy:
      matrix:
        include:
          - engine: pytorch
            artifact_name: release-export-pytorch
          - engine: onnx
            artifact_name: release-export-onnx
          - engine: ncnn
            artifact_name: release-export-ncnn
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[onnx,ncnn]"

      - name: Download Checkpoints Artifact
        uses: actions/download-artifact@v8
        with:
          name: release-checkpoints
          path: release_checkpoints

      - name: Export Release Engine
        run: |
          set -euo pipefail
          python -m cas_ocr_model.export.release_bundle \
            --checkpoint-dir release_checkpoints \
            --output-root release_export \
            --engines "${{ matrix.engine }}" \
            --precisions "fp16 fp32" \
            --legacy-exporter \
            --dynamic-batch \
            --onnx-device cpu \
            --write-meta

      - name: Stage Engine Artifact
        run: |
          set -euo pipefail
          mkdir -p artifact_stage
          cp -R "release_export/${{ matrix.engine }}" artifact_stage/
          # 同时复制 per-engine 元数据 JSON, 供 finalize 阶段合并 manifest
          if [ -f "release_export/_meta_${{ matrix.engine }}.json" ]; then
            cp "release_export/_meta_${{ matrix.engine }}.json" artifact_stage/
          fi

      - name: Upload Release Engine Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact_stage/*

  finalize-release:
    runs-on: ubuntu-24.04
    needs:
      - prepare-release
      - export-release-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download PyTorch Release Artifact
        uses: actions/download-artifact@v8
        with:
          name: release-export-pytorch
          path: release_export

      - name: Download ONNX Release Artifact
        uses: actions/download-artifact@v8
        with:
          name: release-export-onnx
          path: release_export

      - name: Download NCNN Release Artifact
        uses: actions/download-artifact@v8
        with:
          name: release-export-ncnn
          path: release_export

      - name: Merge Release Manifest And Digest
        run: |
          set -euo pipefail
          python3 scripts/export/merge_release_manifest.py \
            --output-root release_export \
            --upload-list release_upload_list.tsv

      - name: Inspect Final Release Export
        run: |
          set -euo pipefail
          find release_export -maxdepth 2 -type f | sort

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}
        run: |
          set -euo pipefail
          while IFS=$'\t' read -r file release_name; do
            gh release upload "$RELEASE_TAG" "$file#$release_name" --clobber
          done < release_upload_list.tsv

      - name: Upload Release Sync Payload
        uses: actions/upload-artifact@v7
        with:
          name: release-sync-payload
          path: |
            release_export
            release_upload_list.tsv

  sync-gitee-release:
    runs-on: ubuntu-24.04
    needs:
      - prepare-release
      - finalize-release
    if: ${{ secrets.GITEE_TOKEN != '' && secrets.GITEE_USERNAME != '' && secrets.GITEE_REPO != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download Release Sync Payload
        uses: actions/download-artifact@v8
        with:
          name: release-sync-payload
          path: .

      - name: Push Release Tag To Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}
        run: |
          set -euo pipefail
          git remote remove gitee 2>/dev/null || true
          git remote add gitee "https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          git fetch --force --tags origin
          git push --force gitee "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"

      - name: Sync Release Assets To Gitee
        env:
          GH_TOKEN: ${{ github.token }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITEE_REPO: ${{ secrets.GITEE_REPO }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}
        run: |
          set -euo pipefail
          python3 scripts/release/sync_gitee_releases.py \
            --tag "$RELEASE_TAG" \
            --asset-manifest release_upload_list.tsv
