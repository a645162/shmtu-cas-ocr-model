name: Release Model Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to process
        required: true
        type: string

permissions:
  contents: write

jobs:
  export-assets:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[export,ncnn]"

      - name: Resolve Release Tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$EVENT_TAG}"
          if [ -z "$TAG" ]; then
            echo "release tag is empty" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download PyTorch Checkpoints
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p release_checkpoints
          gh release download "$RELEASE_TAG" --pattern "*.pt" --dir release_checkpoints || true
          gh release download "$RELEASE_TAG" --pattern "*.pth" --dir release_checkpoints || true
          COUNT="$(find release_checkpoints -maxdepth 1 -type f \( -name '*.pt' -o -name '*.pth' \) | wc -l)"
          if [ "$COUNT" -eq 0 ]; then
            echo "no checkpoint assets found in release $RELEASE_TAG" >&2
            exit 1
          fi
          find release_checkpoints -maxdepth 1 -type f | sort

      - name: Export PyTorch ONNX NCNN
        run: |
          set -euo pipefail
          python -m cas_ocr_model.export.release_bundle \
            --checkpoint-dir release_checkpoints \
            --output-root release_export \
            --precisions "fp16 fp32" \
            --legacy-exporter \
            --dynamic-batch \
            --onnx-device cpu

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            base="$(basename "$file")"
            if [ "$base" = "SHA256SUMS.txt" ]; then
              engine="$(basename "$(dirname "$file")")"
              gh release upload "$RELEASE_TAG" "$file#${engine}.SHA256SUMS.txt" --clobber
            else
              gh release upload "$RELEASE_TAG" "$file" --clobber
            fi
          done < <(find release_export -type f -print0 | sort -z)
