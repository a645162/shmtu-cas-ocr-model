name: Release Model Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to process
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare-release:
    runs-on: ubuntu-24.04
    outputs:
      release-tag: ${{ steps.tag.outputs.release-tag }}
    steps:
      - name: Resolve Release Tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.release_tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          TAG="${INPUT_TAG:-$EVENT_TAG}"
          if [ -z "$TAG" ]; then
            echo "release tag is empty" >&2
            exit 1
          fi
          echo "release-tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download PyTorch Checkpoints
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.release-tag }}
        run: |
          set -euo pipefail
          mkdir -p release_checkpoints
          gh release download "$RELEASE_TAG" --pattern "*.pt" --dir release_checkpoints || true
          gh release download "$RELEASE_TAG" --pattern "*.pth" --dir release_checkpoints || true
          COUNT="$(find release_checkpoints -maxdepth 1 -type f \( -name '*.pt' -o -name '*.pth' \) | wc -l)"
          if [ "$COUNT" -eq 0 ]; then
            echo "no checkpoint assets found in release $RELEASE_TAG" >&2
            exit 1
          fi
          find release_checkpoints -maxdepth 1 -type f | sort

      - name: Upload Checkpoints Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checkpoints
          path: release_checkpoints/*

  export-release-engine:
    runs-on: ubuntu-24.04
    needs: prepare-release
    strategy:
      matrix:
        include:
          - engine: onnx
            artifact_name: release-export-onnx
          - engine: ncnn
            artifact_name: release-export-ncnn
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[export,ncnn]"

      - name: Download Checkpoints Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-checkpoints
          path: release_checkpoints

      - name: Export Release Engine
        run: |
          set -euo pipefail
          python -m cas_ocr_model.export.release_bundle \
            --checkpoint-dir release_checkpoints \
            --output-root release_export \
            --engines "${{ matrix.engine }}" \
            --precisions "fp16 fp32" \
            --legacy-exporter \
            --dynamic-batch \
            --onnx-device cpu \
            --skip-manifest \
            --skip-digest

      - name: Stage Engine Artifact
        run: |
          set -euo pipefail
          mkdir -p artifact_stage
          cp -R "release_export/${{ matrix.engine }}" artifact_stage/

      - name: Upload Release Engine Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifact_stage/*

  finalize-release:
    runs-on: ubuntu-24.04
    needs:
      - prepare-release
      - export-release-engine
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[export,ncnn]"

      - name: Download Checkpoints Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-checkpoints
          path: release_checkpoints

      - name: Download ONNX Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-export-onnx
          path: release_export

      - name: Download NCNN Release Artifact
        uses: actions/download-artifact@v4
        with:
          name: release-export-ncnn
          path: release_export

      - name: Finalize Release Manifest And Digest
        run: |
          set -euo pipefail
          python -m cas_ocr_model.export.release_bundle \
            --checkpoint-dir release_checkpoints \
            --output-root release_export \
            --engines pytorch \
            --precisions "fp16 fp32" \
            --legacy-exporter \
            --dynamic-batch \
            --onnx-device cpu \
            --skip-manifest \
            --skip-digest

          python -m cas_ocr_model.export.release_bundle \
            --checkpoint-dir release_checkpoints \
            --output-root release_export \
            --engines "pytorch onnx ncnn" \
            --precisions "fp16 fp32" \
            --legacy-exporter \
            --dynamic-batch \
            --onnx-device cpu \
            --finalize-only

      - name: Upload Release Assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release-tag }}
        run: |
          set -euo pipefail
          python -m cas_ocr_model.export.release_upload_list \
            --output-root release_export \
            --output release_upload_list.tsv

          while IFS=$'\t' read -r file release_name; do
            gh release upload "$RELEASE_TAG" "$file#$release_name" --clobber
          done < release_upload_list.tsv
