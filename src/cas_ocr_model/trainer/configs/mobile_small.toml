# CAS CAPTCHA 3-head 训练配置 (TOML 示例)
#
# 用法:
#   accelerate launch --num_processes 8 --mixed_precision fp16 \
#       -m cas_ocr_model.trainer.train \
#       --config src/cas_ocr_model/trainer/configs/mobile_small.toml
#
# model.backbone 可选值:
#   - "mobilenet_v3_small"  # 推荐轻量化首选
#   - "resnet18"            # 默认基线
#   - "resnet34"            # 更大更慢, 通常不适合轻量化

[data]
data_root = "/home/konghaomin/Prj/SHMTU/shmtu-terminal/Model/shmtu-cas-ocr-model/dataset" # 数据集根目录
image_size_h = 64                                                # 输入高度, 可尝试 48 / 64
image_size_w = 192                                               # 输入宽度, 可尝试 128 / 160 / 192
threshold = 200                                                  # fixed 模式阈值
binarize_mode = "min_channel_otsu"                               # 可选: min_channel_otsu / gray_otsu / adaptive / fixed
adaptive_block_size = 25                                         # adaptive 模式邻域大小, 必须奇数
adaptive_c = 15                                                  # adaptive 模式阈值偏移
train_ratio = 0.9                                                # 无 manifest 时使用
num_workers = 4                                                  # 每进程 DataLoader worker 数
pin_memory = true                                                # CUDA 推荐 true

[data.augmentation]
enabled = true                 # 训练集增强总开关

translate_enabled = true       # 平移增强开关
translate_prob = 0.7           # 小幅平移概率
translate_x_px = 6             # 水平最大位移, 不裁切
translate_y_px = 3             # 垂直最大位移, 不裁切

affine_enabled = true          # 轻微仿射增强开关
affine_prob = 0.4              # 轻微旋转/shear/缩放概率
rotate_deg = 2.5               # 旋转幅度上限
shear_deg = 4.0                # x 方向 shear 上限
scale_min = 0.97               # 轻微缩小下限
scale_max = 1.03               # 轻微放大上限

morphology_enabled = true      # 腐蚀/膨胀增强开关
morphology_prob = 0.15         # 腐蚀/膨胀概率
morphology_kernel_size = 3     # 形态学核大小

noise_enabled = true           # 稀疏噪点增强开关
noise_prob = 0.10              # 稀疏噪点概率
noise_density = 0.001          # 噪点密度, 建议 0.0005~0.002

binarize_jitter_enabled = true # 训练期二值化扰动开关
binarize_jitter_prob = 0.15    # 训练期二值化参数扰动概率
threshold_jitter = 12          # fixed 模式阈值抖动
adaptive_c_jitter = 3          # adaptive 模式 C 抖动
alt_binarize_modes = ["min_channel_otsu", "gray_otsu"] # 可混入的训练期二值化模式

rethreshold_after_aug = true   # 增强后压回纯二值图

[model]
version = "2.0"                   # 当前模型版本列表: "2.0"
backbone = "mobilenet_v3_small" # 可选: "mobilenet_v3_small" / "resnet18" / "resnet34"
pretrained = true               # true=加载 ImageNet 预训练; false=随机初始化
dropout = 0.2                   # head dropout, 可尝试 0.0 ~ 0.3
slot_hidden_dim = 256           # head 隐层维度, 可尝试 128 / 256
slot_attention_heads = 4        # 注意力头数; 需整除 slot_hidden_dim, 可尝试 2 / 4 / 8

[train]
output_dir = "./runs/mobile_small" # checkpoint / 日志输出目录
seed = 42                          # 随机种子
epochs = 500                       # 总 epoch 数
early_stop_patience = -1           # 0=关闭 early stop; -1=自动取总 epoch 的 20%
per_device_batch_size = 256        # 8 卡 x 256 = 2048 effective
learning_rate = 8.0e-3             # 1e-3 * 8 (线性缩放规则)
weight_decay = 1.0e-4              # AdamW weight decay
warmup_ratio = 0.05                # warmup 占总步数比例
grad_clip = 1.0                    # 梯度裁剪阈值
nonfinite_backprop_step_patience = 10  # 连续多少个 step 出现 NaN/Inf 反传后停训, 0=关闭
nonfinite_backprop_epoch_patience = 10 # 连续多少个 epoch 出现 NaN/Inf 反传后停训, 0=关闭
log_every_n_steps = 20             # 日志打印间隔
save_every_n_epochs = 1            # checkpoint 保存间隔
mixed_precision = "fp16"           # 可选: "fp16" / "bf16" / "no"
gradient_accumulation_steps = 1    # 梯度累积步数
report_to = "auto"                 # auto=已安装 wandb 且未被配置/环境禁用时自动启用，可选: "none" / "wandb"
tracker_project_name = "cas-ocr-train"
use_rich_progress = true           # 主进程 TTY 显示 rich 进度条
# wandb_run_name = "mobile-small-exp1"
# wandb_entity = "your-team"
# wandb_tags = ["ddp", "captcha", "mobilenet"]
# resume_from = "./runs/mobile_small/last.pt"

[loss]
# total_loss =
#   weight_digit_left * loss_digit_left
# + weight_operator * loss_operator
# + weight_digit_right * loss_digit_right
# + weight_slot_order * loss_slot_order
# + weight_slot_overlap * loss_slot_overlap
# + weight_slot_right_boundary * loss_slot_right_boundary   (enable_slot_right_boundary=true 时)
# + weight_slot_attention_variance * loss_slot_attention_variance (enable_slot_attention_variance=true 时)
#
# 若 enable_operator_class_balance=true:
#   loss_operator 内部会再乘 operator_class_weights[class_id]

weight_digit_left = 1.0   # 左数字分类损失权重
weight_operator = 1.0     # 运算符分类损失权重
weight_digit_right = 1.0  # 右数字分类损失权重

label_smoothing = 0.05    # 建议 0.0 ~ 0.1
focal_gamma = 0.0         # 关闭 focal; 难样本多时可试 1.0 / 2.0

weight_slot_order = 0.1   # 槽位顺序约束权重
weight_slot_overlap = 0.05 # 槽位重叠惩罚权重
slot_margin = 0.10        # 槽位中心最小间距

enable_slot_right_boundary = true       # 第三个槽位是否限制在 '=' 左侧
weight_slot_right_boundary = 0.01       # 温和启用, 影响稍小
slot_right_boundary_max = 0.68          # 第三个槽位中心允许的最右边界

enable_slot_attention_variance = true   # 是否限制 attention 过散
weight_slot_attention_variance = 0.005  # 温和启用, 影响稍小
slot_attention_max_variance = 0.035     # 单个槽位 attention 方差上界

enable_operator_class_balance = true    # 是否给 operator head 加类别权重
operator_class_weights = [1.0, 1.05, 1.1] # 轻微类别平衡, 顺序与 OPERATOR_LABELS 一致
