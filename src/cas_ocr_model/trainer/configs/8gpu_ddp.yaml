# 8 卡 DDP 训练配置 (CASINO CAPTCHA 3-head)
# 配合: accelerate launch --num_processes 8 --mixed_precision fp16 \
#       -m cas_ocr_model.trainer.train --config configs/8gpu_ddp.yaml

data:
  data_root: /home/konghaomin/Prj/SHMTU/shmtu-terminal/dataset
  image_size_h: 64
  image_size_w: 192
  threshold: 200
  train_ratio: 0.9
  num_workers: 4
  pin_memory: true

model:
  backbone: resnet18   # 或 resnet34
  pretrained: true
  dropout: 0.2

train:
  output_dir: ./runs/8gpu_ddp
  seed: 42
  epochs: 30
  per_device_batch_size: 256       # 8 卡 x 256 = 2048 effective
  learning_rate: 8.0e-3            # 1e-3 * 8 (线性缩放规则)
  weight_decay: 1.0e-4
  warmup_ratio: 0.05
  grad_clip: 1.0
  log_every_n_steps: 20
  save_every_n_epochs: 1
  mixed_precision: fp16            # 与用户偏好对齐 (A100/H100/RTX40 也都支持)
  gradient_accumulation_steps: 1
  # resume_from: null

loss:
  weight_digit_left: 1.0
  weight_operator: 1.0
  weight_digit_right: 1.0
  label_smoothing: 0.05
